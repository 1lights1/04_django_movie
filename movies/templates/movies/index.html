{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center my-4">
  <h1 class="display-5 fw-bold">영화 목록</h1>
  <a href="{% url 'movies:create' %}" class="btn btn-primary">새 영화 등록</a>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
  {% for movie in movies %}
    <div class="col">
      <div class="card h-100 shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title fw-bold text-truncate">{{ movie.title }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{ movie.director }}</h6>
          <p class="card-text text-secondary text-truncate" style="max-height: 3rem;">
            {{ movie.description }}
          </p>
        </div>
        <div class="card-footer bg-transparent border-0 pb-3">
          <a href="{% url 'movies:detail' movie.pk %}" class="btn btn-outline-primary w-100">상세 정보</a>
        </div>
      </div>
    </div>
  {% empty %}
    <div class="col-12 text-center py-5">
      <p class="text-muted">등록된 영화가 없습니다.</p>
    </div>
  {% endfor %}
</div>
{% endblock %}
