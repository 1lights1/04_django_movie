{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 shadow-lg mt-3">
      <div class="card-header bg-primary text-white py-3">
        <h4 class="mb-0 text-center">{% if request.resolver_match.url_name == 'create' %}새 영화 등록{% else %}영화 정보 수정{% endif %}</h4>
      </div>
      <div class="card-body p-4">
        <form action="" method="POST">
          {% csrf_token %}
          
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-bold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}

          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg">저장하기</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
  /* Django 기본 Form 위젯에 Bootstrap 클래스 강제 적용 */
  input, textarea, select {
    display: block;
    width: 100%;
    padding: 0.375rem 0.75rem;
    font-size: 1rem;
    border: 1px solid #dee2e6;
    border-radius: 0.375rem;
  }
</style>
{% endblock content %}
